<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style = "background-color: black; color: whitesmoke;">
    <ul class="language">
        <li>Js</li>
    </ul>
</body>
<script>
    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("typeScript")
    function addOptiLanguage(langName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage('goLang')
//using innerHTML is not a good approach beause it traverse the whole tree while adding new element
//createTextNode() is a good approach
    //EDIT
    const secLang = document.querySelector("li:nth-child(2)")
    //secLang.innerHTML = "MOJO"
    const newli = document.createElement("li")
    newli.textContent = "JAVA"
    secLang.replaceWith(newli)

    //EDIT
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>JS</li>'

    //REMOVE
    const lastLang = document.querySelector("li:last-child")
    lastLang.remove()
</script>
</html>
